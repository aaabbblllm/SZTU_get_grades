name: GPA Monitor

on:
  schedule:
    # 北京时间 08:00 ~ 24:00 每小时一次（UTC 0:00 ~ 16:00）
    - cron: '0 0-16 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  run_monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行成绩监控脚本
        env:
          STU_ID: ${{ secrets.STU_ID }}
          STU_PWD: ${{ secrets.STU_PWD }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
          TZ: Asia/Shanghai
        run: python get_grades.py

      - name: 保存历史记录
        run: |
          git config user.name "GPA Monitor Bot"
          git config user.email "bot@example.com"
          git add -f grade_history.json
          if ! git diff --cached --quiet; then
            git commit -m "auto: update grade history"
            git push
          else
            echo "无变化，跳过提交"
          fi
